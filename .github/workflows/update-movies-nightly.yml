name: Nightly Movie Updates

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-movie-updates
  cancel-in-progress: false

jobs:
  update-movies:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      MINIO_ENDPOINT: ${{ vars.MINIO_ENDPOINT }}
      MINIO_REGION: ${{ vars.MINIO_REGION }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_USE_SSL: ${{ vars.MINIO_USE_SSL }}
      MINIO_BUCKET: ${{ vars.MINIO_BUCKET }}
      MINIO_PUBLIC_BASE_URL: ${{ vars.MINIO_PUBLIC_BASE_URL }}
      PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
      PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Run nightly movie updates
        run: bun --filter @waslaeuftin/web update:movies:all
