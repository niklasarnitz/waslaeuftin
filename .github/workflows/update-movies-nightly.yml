name: Nightly Movie Updates

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-movie-updates
  cancel-in-progress: false

jobs:
  update-movies:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
      PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      TMDB_IMAGE_BASE_URL: ${{ secrets.TMDB_IMAGE_BASE_URL }}
      TMDB_POSTER_SIZE: ${{ secrets.TMDB_POSTER_SIZE }}
      TMDB_MIN_CONFIDENCE_SCORE: ${{ secrets.TMDB_MIN_CONFIDENCE_SCORE }}
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_REGION: ${{ secrets.MINIO_REGION }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_USE_SSL: ${{ secrets.MINIO_USE_SSL }}
      MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
      MINIO_MOVIE_COVERS_PREFIX: ${{ secrets.MINIO_MOVIE_COVERS_PREFIX }}
      MINIO_PUBLIC_BASE_URL: ${{ secrets.MINIO_PUBLIC_BASE_URL }}
      UMAMI_URL: ${{ secrets.UMAMI_URL }}
      UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run nightly movie updates
        run: bun run update:movies:all
