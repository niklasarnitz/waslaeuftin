<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Deep brand background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#241657" />
      <stop offset="100%" stop-color="#100828" />
    </linearGradient>
    <!-- Light play mark -->
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#C4B5FD" />
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)" />

  <!-- Single rounded play triangle -->
  <polygon points="404,330 404,694 728,512"
           fill="url(#play)" stroke="url(#play)"
           stroke-width="72" stroke-linejoin="round" />
</svg>
