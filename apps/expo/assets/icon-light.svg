<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Soft lavender background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F5FF" />
      <stop offset="100%" stop-color="#E7DEFB" />
    </linearGradient>
    <!-- Brand purple play mark -->
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#5B21B6" />
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)" />

  <!-- Single rounded play triangle -->
  <polygon points="404,330 404,694 728,512"
           fill="url(#play)" stroke="url(#play)"
           stroke-width="72" stroke-linejoin="round" />
</svg>
